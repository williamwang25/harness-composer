policy_name: python_large_repo
description: Search-first Python policy for large pytest-style repositories.
prompt_fragments:
  - base
  - tool_kernel
  - python_pytest
  - large_repo
tool_kernel:
  - search_code
  - view_file
  - safe_edit
  - run_test
  - summarize_obs
  - state
context_policy:
  search_first: true
  forbid_full_file_dump: true
  max_open_files_per_turn: 2
  file_view_mode: range_based
  prefer_symbol_search: true
test_policy:
  targeted_first: true
  likely_command: pytest -q
  max_full_tests: 1
  parse_failed_tests: true
compression_policy:
  pytest: traceback_assertion_only
  rg: top_matches_with_context
  generic: tail_and_error_blocks
control_policy:
  max_turns: 45
  repeated_command_warning: true
  budget_warning: true
memory_policy:
  external_state: true
expected_benefit: Reduce file-reading and test-output tokens in large Python repositories.
risk: Search-first routing can miss behavior hidden in configuration files.
