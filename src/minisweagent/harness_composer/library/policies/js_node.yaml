policy_name: js_node
description: Node package policy for JavaScript and TypeScript repositories.
prompt_fragments:
  - base
  - tool_kernel
  - js_node
tool_kernel:
  - search_code
  - view_file
  - safe_edit
  - run_test
  - summarize_obs
context_policy:
  search_first: true
  forbid_full_file_dump: true
  max_open_files_per_turn: 3
  file_view_mode: range_based
test_policy:
  targeted_first: true
  likely_command: npm test
  max_full_tests: 1
compression_policy:
  npm: failure_summary
  generic: tail_and_error_blocks
control_policy:
  max_turns: 40
  repeated_command_warning: true
memory_policy:
  external_state: false
expected_benefit: Prefer package-script discovery and compact npm failure output.
risk: Package managers other than npm may require manual adjustment.
