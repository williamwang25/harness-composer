policy_name: fallback
description: General lean harness when no specialized route matches.
prompt_fragments:
  - base
  - tool_kernel
tool_kernel:
  - search_code
  - view_file
  - safe_edit
  - run_test
context_policy:
  search_first: true
  forbid_full_file_dump: true
  max_open_files_per_turn: 3
  file_view_mode: range_based
test_policy:
  targeted_first: true
  max_full_tests: 1
compression_policy:
  generic: tail_and_error_blocks
control_policy:
  max_turns: 35
  repeated_command_warning: true
memory_policy:
  external_state: false
expected_benefit: Keep context bounded without assuming a language-specific workflow.
risk: May miss project-specific build commands.
