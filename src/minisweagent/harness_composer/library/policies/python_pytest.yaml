policy_name: python_pytest
description: Lean Python policy for pytest-based repositories.
prompt_fragments:
  - base
  - tool_kernel
  - python_pytest
tool_kernel:
  - search_code
  - view_file
  - safe_edit
  - run_test
  - summarize_obs
context_policy:
  search_first: true
  forbid_full_file_dump: true
  max_open_files_per_turn: 3
  file_view_mode: range_based
test_policy:
  targeted_first: true
  likely_command: pytest -q
  max_full_tests: 2
  parse_failed_tests: true
compression_policy:
  pytest: traceback_assertion_only
  rg: top_matches_with_context
  generic: tail_and_error_blocks
control_policy:
  max_turns: 40
  repeated_command_warning: true
memory_policy:
  external_state: false
expected_benefit: Bias toward targeted pytest reproduction and compact failure output.
risk: Repositories using tox or nox may need a custom test command.
